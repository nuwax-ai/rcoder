assistant_context = { git = "https://github.com/zed-industries/zed.git", branch = "main", package = "assistant_context" }
assistant_tool = { git = "https://github.com/zed-industries/zed.git", branch = "main", package = "assistant_tool" }
assistant_tools = { git = "https://github.com/zed-industries/zed.git", branch = "main", package = "assistant_tools" }
cloud_llm_client = { git = "https://github.com/zed-industries/zed.git", branch = "main", package = "cloud_llm_client" }
html_to_markdown = { git = "https://github.com/zed-industries/zed.git", branch = "main", package = "html_to_markdown" }
web_search = { git = "https://github.com/zed-industries/zed.git", branch = "main", package = "web_search" }
zed_env_vars = { git = "https://github.com/zed-industries/zed.git", branch = "main", package = "zed_env_vars" }

# Additional utilities
indoc = "2.0"
parking_lot = "0.12"
convert_case = "0.8"
handlebars = { version = "6.0", features = ["rust-embed"] }
rust-embed = "8.0"
zstd = "0.13"

# Additional dependencies for Zed crates
libc = "0.2"
nix = { version = "0.30", features = ["fs", "process", "term"] }
gpui_tokio = { git = "https://github.com/zed-industries/zed.git", branch = "main", package = "gpui_tokio" }
reqwest_client = { git = "https://github.com/zed-industries/zed.git", branch = "main", package = "reqwest_client" }
clock = { git = "https://github.com/zed-industries/zed.git", branch = "main", package = "clock" }
theme = { git = "https://github.com/zed-industries/zed.git", branch = "main", package = "theme" }
tree-sitter-rust = { git = "https://github.com/zed-industries/zed.git", branch = "main", package = "tree-sitter-rust" }
unindent = { git = "https://github.com/zed-industries/zed.git", branch = "main", package = "unindent" }
zlog = { git = "https://github.com/zed-industries/zed.git", branch = "main", package = "zlog" }
open = { git = "https://github.com/zed-industries/zed.git", branch = "main", package = "open" }
agent = { git = "https://github.com/zed-industries/zed.git", branch = "main", package = "agent" }

# Additional dependencies for nuwax_parser
sha2 = "0.10"
hex = "0.4"
walkdir = "2.5"
reqwest = { version = "0.12", features = ["stream"] }

# Dev dependencies for testing
ctor = "0.5"
pretty_assertions = "1.4"
tempfile = "3.8"