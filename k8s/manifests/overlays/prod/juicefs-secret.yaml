# ============================================================
# JuiceFS Secret - Prod 环境专用
# 覆盖 base 中的 juicefs-secret
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: juicefs-secret
  namespace: nuwax-rcoder-prod
type: Opaque
stringData:
  # JuiceFS CE 必需字段（小写键名）
  name: "rcoder-juicefs"
  metaurl: "postgres://juicefs:juicefs_password@postgresql.nuwax-rcoder-prod:5432/juicefs"
  storage: "minio"
  bucket: "http://minio-service.nuwax-rcoder-prod:9000/juicefs"
  access-key: "minioadmin"
  secret-key: "minioadmin"

  # 兼容字段（保留给现有脚本/日志使用）
  METAURL: "postgres://juicefs:juicefs_password@postgresql.nuwax-rcoder-prod:5432/juicefs"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"
  MINIO_ADDRESS: "minio-service.nuwax-rcoder-prod:9000"

  # 其他配置
  APPEND_FSYNC: "1"
  CACHE_SIZE: "1024"
