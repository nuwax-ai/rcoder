# Dev environment overlay
# 使用方式: kubectl apply -k manifests/overlays/dev

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nuwax-rcoder-dev

resources:
  - juicefs-secret.yaml  # 覆盖 base 中的 juicefs-secret

bases:
  - ../../base

# 开发环境配置覆盖
commonLabels:
  environment: dev

# 开发环境镜像 tag
images:
  - name: nuwax-docker-images-registry.cn-hangzhou.cr.aliyuncs.com/dev/rcoder
    newTag: latest
  - name: nuwax-docker-images-registry.cn-hangzhou.cr.aliyuncs.com/dev/rcoder-agent-runner
    newTag: latest

# 开发环境配置覆盖
patches:
  # 开发环境使用更小的资源
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: rcoder
      spec:
        replicas: 1
    target:
      kind: Deployment
      name: rcoder

  # 替换 juicefs-init-job 中的 namespace 域名
  - patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: juicefs-init
      spec:
        template:
          spec:
            containers:
            - name: juicefs-format
              command:
                - sh
                - -c
                - |
                  set -e
                  METAURL="postgres://juicefs:juicefs_password@postgresql.nuwax-rcoder-dev:5432/juicefs"
                  VOLUME_NAME="rcoder-juicefs"
                  BUCKET="http://minio-service.nuwax-rcoder-dev:9000/juicefs"

                  echo '=== Creating MinIO bucket ==='
                  apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
                  curl -s -X PUT -u minioadmin:minioadmin "${BUCKET}/" || true

                  echo '=== Checking if volume exists ==='
                  /usr/local/bin/juicefs status "$METAURL" 2>&1 && echo "Volume already exists" || {
                    echo '=== Volume does not exist, formatting ==='
                    /usr/local/bin/juicefs format \
                      "$METAURL" \
                      "$VOLUME_NAME" \
                      --storage minio \
                      --bucket "$BUCKET" \
                      --access-key minioadmin \
                      --secret-key minioadmin
                    echo '=== Volume formatted successfully ==='
                  }

                  echo '=== Verifying volume status ==='
                  /usr/local/bin/juicefs status "$METAURL"
    target:
      kind: Job
      name: juicefs-init

  # 替换 StorageClass 中的 secret-namespace
  - patch: |-
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: juicefs-sc
      parameters:
        csi.storage.k8s.io/provisioner-secret-namespace: nuwax-rcoder-dev
        csi.storage.k8s.io/controller-expand-secret-namespace: nuwax-rcoder-dev
        csi.storage.k8s.io/node-publish-secret-namespace: nuwax-rcoder-dev
    target:
      kind: StorageClass
      name: juicefs-sc

  # 替换 rcoder deployment 中的 RCODER_K8S_NAMESPACE 环境变量
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: rcoder
      spec:
        template:
          spec:
            containers:
            - name: rcoder
              env:
              - name: RCODER_K8S_NAMESPACE
                value: nuwax-rcoder-dev
    target:
      kind: Deployment
      name: rcoder
