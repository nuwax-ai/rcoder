# RCoder 静态工作空间 PVC
# 供给 RCoder Deployment 主服务使用（提前创建，Pod 启动时必须存在）
# 动态 Agent Pod 使用各自的 PVC（由 kubernetes_runtime.rs + NFS Subdir External Provisioner 自动创建）
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rcoder-workspace
  namespace: rcoder
  labels:
    app: rcoder
spec:
  # ReadWriteMany: 支持 K8s 多节点同时读写 (NFS 特性)
  # 注意: 云厂商块存储 (AWS EBS / 阿里云 ESSD) 不支持 RWX, 必须使用 NFS
  accessModes: ["ReadWriteMany"]
  storageClassName: rcoder-nfs
  resources:
    requests:
      storage: 50Gi