apiVersion: apps/v1
kind: Deployment
metadata:
  name: rcoder
  namespace: rcoder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rcoder
  template:
    metadata:
      labels:
        app: rcoder
    spec:
      serviceAccountName: rcoder-pods-sa
      containers:
      - name: rcoder
        image: nuwax-docker-images-registry.cn-hangzhou.cr.aliyuncs.com/dev/rcoder:latest
        imagePullPolicy: Always
        command: ["/app/bin/rcoder"]
        args: ["--port", "8087"]
        ports:
        - containerPort: 8087
        env:
        - name: CONTAINER_RUNTIME
          value: "kubernetes"
        - name: RCODER_K8S_NAMESPACE
          value: "rcoder"
        - name: RUST_LOG
          value: "info"
        - name: RCODER_DOCKER_IMAGE
          value: "nuwax-docker-images-registry.cn-hangzhou.cr.aliyuncs.com/dev/rcoder:latest"
        - name: RCODER_DOCKER_IMAGE_COMPUTER
          value: "nuwax-docker-images-registry.cn-hangzhou.cr.aliyuncs.com/dev/rcoder-agent-runner:latest"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: rcoder-config
          mountPath: /app/config.yml
          subPath: config.yml
      volumes:
      - name: rcoder-config
        configMap:
          name: rcoder-config
