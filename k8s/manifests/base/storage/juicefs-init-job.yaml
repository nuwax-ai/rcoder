# ============================================================
# JuiceFS 初始化 Job (开源版)
# 使用节点本地镜像
# ============================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: juicefs-init
  namespace: kube-system
spec:
  template:
    spec:
      containers:
      - name: juicefs-format
        image: localhost:5000/juicedata/juicefs:1.3.1
        command:
          - sh
          - -c
          - |
            set -e
            METAURL="postgres://juicefs:juicefs_password@postgresql.nuwax-rcoder:5432/juicefs"
            VOLUME_NAME="rcoder-juicefs"
            BUCKET="http://minio-service.nuwax-rcoder:9000/juicefs"

            echo '=== Creating MinIO bucket ==='
            apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
            curl -s -X PUT -u minioadmin:minioadmin "${BUCKET}/" || true

            echo '=== Checking if volume exists ==='
            /usr/local/bin/juicefs status "$METAURL" 2>&1 && echo "Volume already exists" || {
              echo '=== Volume does not exist, formatting ==='
              /usr/local/bin/juicefs format \
                "$METAURL" \
                "$VOLUME_NAME" \
                --storage minio \
                --bucket "$BUCKET" \
                --access-key minioadmin \
                --secret-key minioadmin
              echo '=== Volume formatted successfully ==='
            }

            echo '=== Verifying volume status ==='
            /usr/local/bin/juicefs status "$METAURL"
        securityContext:
          privileged: true
      restartPolicy: OnFailure