# ============================================================
# JuiceFS Secret
# 存储 MinIO 和 PostgreSQL 连接信息
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: juicefs-secret
  namespace: nuwax-rcoder
type: Opaque
stringData:
  # PostgreSQL 连接信息 (JuiceFS 元数据)
  METAURL: "postgres://juicefs:juicefs_password@postgresql.nuwax-rcoder:5432/juicefs"

  # MinIO S3 配置 (JuiceFS 数据存储)
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"

  # 其他配置
  APPEND_FSYNC: "1"
  CACHE_SIZE: "1024"
