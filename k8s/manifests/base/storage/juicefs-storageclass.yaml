# ============================================================
# JuiceFS StorageClass
#
# 注意：需要先部署 JuiceFS CSI Driver
# 参考: https://github.com/JuiceFS/juke
#
# 注意：secret-namespace 由各环境 overlay 通过 patches 覆盖
# ============================================================
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: juicefs-sc
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: csi.juicefs.com
parameters:
  # 指定 Secret 的名称和命名空间 (会被 overlay patches 覆盖 namespace)
  csi.storage.k8s.io/provisioner-secret-name: juicefs-secret
  csi.storage.k8s.io/provisioner-secret-namespace: placeholder-namespace
  csi.storage.k8s.io/controller-expand-secret-name: juicefs-secret
  csi.storage.k8s.io/controller-expand-secret-namespace: placeholder-namespace
  csi.storage.k8s.io/node-publish-secret-name: juicefs-secret
  csi.storage.k8s.io/node-publish-secret-namespace: placeholder-namespace
  # 禁用 controller quota set (开源版不支持)
  juicefs/controllerQuotaSet: "false"
  # 强制使用社区版 Mount 镜像，避免误用 ee 镜像
  juicefs/mountImage: "juicedata/mount:ce-v1.3.1"
  # JuiceFS 挂载选项
  juicefs/mountOptions: "cache-size=1024,allow-other"
reclaimPolicy: Retain  # 重要！防止误删导致数据丢失
allowVolumeExpansion: true
volumeBindingMode: Immediate
