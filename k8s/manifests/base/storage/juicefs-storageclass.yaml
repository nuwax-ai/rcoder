# ============================================================
# JuiceFS StorageClass
#
# 注意：需要先部署 JuiceFS CSI Driver
# 参考: https://github.com/JuiceFS/juke
# ============================================================
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: juicefs-sc
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: csi.juicefs.com
parameters:
  # 指定 Secret 的名称和命名空间
  csi.storage.k8s.io/provisioner-secret-name: juicefs-secret
  csi.storage.k8s.io/provisioner-secret-namespace: nuwax-rcoder
  csi.storage.k8s.io/controller-expand-secret-name: juicefs-secret
  csi.storage.k8s.io/controller-expand-secret-namespace: nuwax-rcoder
  csi.storage.k8s.io/node-publish-secret-name: juicefs-secret
  csi.storage.k8s.io/node-publish-secret-namespace: nuwax-rcoder
  # JuiceFS 挂载选项
  juicefs/mountOptions: "cache-size=1024,allow-other"
reclaimPolicy: Retain  # 重要！防止误删导致数据丢失
allowVolumeExpansion: true
volumeBindingMode: Immediate
