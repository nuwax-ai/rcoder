---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rcoder-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rcoder.labels" . | nindent 4 }}
data:
  config.yml: |
    # RCoder 配置文件
    default_agent: {{ .Values.rcoder.config.defaultAgent | quote }}

    # 项目工作目录
    projects_dir: {{ .Values.rcoder.config.projectsDir | quote }}

    # 主服务端口
    port: {{ .Values.rcoder.port }}

    # 容器清理配置
    cleanup_config:
      enabled: {{ .Values.cleanup.enabled }}
      idle_timeout_seconds: {{ .Values.cleanup.idleTimeoutSeconds }}
      cleanup_interval_seconds: {{ .Values.cleanup.cleanupIntervalSeconds }}
      docker_stop_timeout_seconds: {{ .Values.cleanup.dockerStopTimeoutSeconds }}

    # Pingora 反向代理配置
    proxy_config:
      listen_port: 8088
      default_backend_port: 8087
      backend_host: "127.0.0.1"
      port_param: "port"
      health_check:
        enabled: true
        interval_seconds: 5
        timeout_seconds: 1
        healthy_threshold: 2
        unhealthy_threshold: 3

    # Docker 配置
    docker_config:
      multi_image_config:
        global_defaults:
          registry_prefix: {{ .Values.image.registry | quote }}

        services:
          rcoder:
            service_type: "RCoder"
            arm64_image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            amd64_image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            default_image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            image_tag_prefix: "rcoder"
            enabled: true

          computer-agent-runner:
            service_type: "ComputerAgentRunner"
            arm64_image: "{{ .Values.image.agentRunner.registry }}/{{ .Values.image.agentRunner.repository }}:{{ .Values.image.agentRunner.tag }}"
            amd64_image: "{{ .Values.image.agentRunner.registry }}/{{ .Values.image.agentRunner.repository }}:{{ .Values.image.agentRunner.tag }}"
            default_image: "{{ .Values.image.agentRunner.registry }}/{{ .Values.image.agentRunner.repository }}:{{ .Values.image.agentRunner.tag }}"
            image_tag_prefix: "rcoder-computer-agent-runner"
            enabled: true

        selection_strategy: "ServiceOnly"

        cache_config:
          enabled: true
          ttl_seconds: 3600
          max_entries: 50

      network_base_name: {{ .Values.docker.networkBaseName | quote }}
      network_mode: {{ .Values.docker.networkMode | quote }}
      work_dir: "/app"
      auto_cleanup: {{ .Values.docker.autoCleanup }}
      container_ttl_seconds: {{ .Values.docker.containerTtlSeconds }}

    # API Key 鉴权配置
    api_key_auth:
      enabled: false
      api_key: "YOUR_API_KEY_HERE"

    # K8s JuiceFS 存储配置
    kubernetes_config:
      storage_class: {{ .Values.juicefs.storageClass | quote }}
