{{- if .Values.minio.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: {{ .Values.namespace }}
  labels:
    app: minio
    {{- include "rcoder.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.minio.storage.storageClass }}
  resources:
    requests:
      storage: {{ .Values.minio.storage.size }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: {{ .Values.namespace }}
  labels:
    app: minio
    {{- include "rcoder.labels" . | nindent 4 }}
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
        {{- include "rcoder.labels" . | nindent 8 }}
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.auth.username }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.minio.auth.password }}
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          volumeMounts:
            - name: minio-data
              mountPath: /data
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: {{ .Values.namespace }}
  labels:
    app: minio
    {{- include "rcoder.labels" . | nindent 4 }}
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: minio-service
  namespace: {{ .Values.namespace }}
  labels:
    app: minio
    {{- include "rcoder.labels" . | nindent 4 }}
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
# MinIO Bucket Init Job
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: {{ .Values.namespace }}
  labels:
    app: minio-init
    {{- include "rcoder.labels" . | nindent 4 }}
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for MinIO to be ready..."
              until mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
                echo "MinIO not ready, retrying..."
                sleep 2
              done
              echo "MinIO is ready, creating bucket..."
              mc mb myminio/{{ .Values.minio.bucket }} --ignore-existing
              mc ls myminio/
              echo "MinIO initialization completed!"
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.auth.username }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.minio.auth.password }}
{{- end }}
