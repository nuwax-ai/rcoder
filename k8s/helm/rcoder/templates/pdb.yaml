{{- if .Values.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: rcoder-pdb
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rcoder.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "rcoder.selectorLabels" . | nindent 6 }}
{{- end }}
