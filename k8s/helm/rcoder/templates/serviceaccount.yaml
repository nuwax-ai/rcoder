{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rcoder.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

{{- if .Values.rbac.create }}
---
# ClusterRole for Pod management
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "rcoder.fullname" . }}-clusterrole
  labels:
    {{- include "rcoder.labels" . | nindent 4 }}
rules:
  # Pod 管理
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch", "patch", "update"]
  # Pod 日志
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  # Pod 执行命令
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Pod 状态
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get"]
  # PVC 管理
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "rcoder.fullname" . }}-clusterrolebinding
  labels:
    {{- include "rcoder.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Values.namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "rcoder.fullname" . }}-clusterrole
  apiGroup: rbac.authorization.k8s.io
{{- end }}
