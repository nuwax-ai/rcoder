---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: {{ .Release.Namespace }}
  labels:
    app: minio
    {{- include "rcoder.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.minio.storage.storageClass }}
  storageClassName: {{ .Values.minio.storage.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.minio.storage.size | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: {{ .Release.Namespace }}
  labels:
    app: minio
    {{- include "rcoder.labels" . | nindent 4 }}
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
        {{- include "rcoder.labels" . | nindent 8 }}
    spec:
      {{- include "rcoder.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: minio
          image: {{ include "rcoder.thirdPartyImage" (dict "repository" .Values.minio.image.repository "tag" .Values.minio.image.tag "ctx" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.minio.service.apiPort }}
              name: api
            - containerPort: {{ .Values.minio.service.consolePort }}
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: rcoder-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rcoder-credentials
                  key: MINIO_ROOT_PASSWORD
          args:
            - server
            - /data
            - --console-address
            - ":{{ .Values.minio.service.consolePort }}"
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: {{ .Values.minio.service.apiPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: {{ .Values.minio.service.apiPort }}
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: minio-data
              mountPath: /data
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-pvc
