{{- if and .Values.networkPolicy.enabled (eq .Values.networkPolicy.enabled true) }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rcoder-network-policy
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rcoder.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "rcoder.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.rcoder.port }}
        - protocol: TCP
          port: 8088
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: minio
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9001
    {{- if .Values.networkPolicy.allowedCIDRs }}
    {{- range .Values.networkPolicy.allowedCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ . }}
      ports:
        - protocol: TCP
          port: {{ $.Values.rcoder.port }}
    {{- end }}
    {{- end }}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
{{- end }}
