# Default values for rcoder.
# 文档: https://artifacthub.io/packages/helm/rcoder/rcoder

# 镜像配置
image:
  registry: nuwax-docker-images-registry.cn-hangzhou.cr.aliyuncs.com/dev
  repository: rcoder
  tag: latest
  pullPolicy: Always

  # Agent Runner 镜像
  agentRunner:
    registry: nuwax-docker-images-registry.cn-hangzhou.cr.aliyuncs.com/dev
    repository: rcoder-agent-runner
    tag: latest

# 命名空间 (默认创建)
namespace: nuwax-rcoder
createNamespace: true

# Replica 数量
replicaCount: 1

# RCoder 服务配置
rcoder:
  port: 8087
  logLevel: info
  config:
    defaultAgent: "Claude"
    projectsDir: "/app/project_workspace"

# JuiceFS 存储配置
juicefs:
  enabled: true
  # StorageClass 名称
  storageClass: juicefs-sc
  # PVC 大小
  pvcSize: 50Gi
  # Secret 名称 (如果使用外部 Secret)
  secretName: juicefs-secret

# PostgreSQL 配置 (可选，使用外部 PostgreSQL 时设为 false)
postgresql:
  enabled: true
  # 内嵌 PostgreSQL 配置
  auth:
    database: juicefs
    username: juicefs
    password: juicefs_password
  # 资源限制
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  # 存储大小
  storage:
    size: 20Gi
    # 使用 Longhorn 存储类（支持快照、备份、在线扩容）
    # 单节点环境下，建议定期备份到 S3
    storageClass: longhorn
  # 如果使用外部 PostgreSQL，配置以下项
  external: false
  host: ""
  port: 5432

# MinIO 配置 (可选，使用外部 MinIO/S3 时设为 false)
minio:
  enabled: true
  # 内嵌 MinIO 配置
  auth:
    username: minioadmin
    password: minioadmin
  # Bucket 名称
  bucket: juicefs
  # 资源限制
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  # 存储大小
  storage:
    size: 100Gi
    # 使用 Longhorn 存储类（支持快照、备份、在线扩容）
    # 单节点环境下，建议定期备份到 S3
    storageClass: longhorn
  # 如果使用外部 S3，配置以下项
  external: false
  endpoint: ""
  accessKey: ""
  secretKey: ""

# Service 配置
service:
  type: NodePort
  port: 8087
  nodePort: 30080
  annotations: {}

# Ingress 配置
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: rcoder.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: rcoder-tls
  #    hosts:
  #      - rcoder.local

# 资源限制
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# 探针配置
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2

# Pod 配置
pod:
  annotations: {}
  securityContext: {}
  terminationGracePeriodSeconds: 60

# 容器配置
container:
  securityContext:
    privileged: false
    readOnlyRootFilesystem: false

# 网络策略
networkPolicy:
  enabled: true
  # 允许访问的 CIDR
  allowedCIDRs: []

# PodDisruptionBudget
pdb:
  enabled: true
  minAvailable: 1

# 服务账号
serviceAccount:
  create: true
  name: rcoder-pods-sa
  annotations: {}

# RBAC
rbac:
  create: true
  clusterRole: true

# 清理配置
cleanup:
  enabled: true
  idleTimeoutSeconds: 600
  cleanupIntervalSeconds: 300
  dockerStopTimeoutSeconds: 30

# Docker 配置
docker:
  autoCleanup: true
  containerTtlSeconds: 3600
  networkBaseName: agent-network
  networkMode: bridge
