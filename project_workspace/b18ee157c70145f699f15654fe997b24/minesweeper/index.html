<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>扫雷游戏</h1>
            <div class="controls">
                <div class="difficulty-selector">
                    <label>难度：</label>
                    <select id="difficulty">
                        <option value="easy">简单 (9×9, 10雷)</option>
                        <option value="medium">中等 (16×16, 40雷)</option>
                        <option value="hard">困难 (16×30, 99雷)</option>
                    </select>
                </div>
                <button id="new-game">新游戏</button>
                <button id="reset-game">重置</button>
            </div>
            <div class="game-info">
                <div class="info-item">
                    <span class="label">剩余雷数：</span>
                    <span id="mine-count">10</span>
                </div>
                <div class="info-item">
                    <span class="label">时间：</span>
                    <span id="timer">000</span>
                </div>
            </div>
        </header>

        <main>
            <div id="game-board" class="game-board"></div>
        </main>

        <div id="game-over-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="game-result"></h2>
                <p id="game-stats"></p>
                <button id="play-again">再玩一次</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
