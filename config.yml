# rcoder 配置文件
# 该文件在首次启动时自动生成

# 默认使用的 AI 代理类型 (Codex/Claude)
default_agent: Claude

# 项目工作目录
projects_dir: ./project_workspace

# 主服务端口
port: 8086

# Pingora 反向代理配置
proxy_config:
  # 代理服务监听端口 (用于接收外部请求)
  listen_port: 8088
  # 默认后端服务端口 (当请求未指定端口时使用)
  default_backend_port: 8086
  # 后端服务主机地址
  backend_host: "127.0.0.1"
  # URL 中端口参数的名称 (用于从路径中提取端口号)
  port_param: "port"
  # 健康检查配置
  health_check:
    enabled: true
    interval_seconds: 5
    timeout_seconds: 1
    healthy_threshold: 2
    unhealthy_threshold: 3

# Docker 配置
docker_config:
  # Docker 镜像名称 (留空使用默认镜像)
  # 如果指定了此字段，将优先使用该镜像，忽略架构特定镜像
  image: null

  # ARM64 架构专用镜像
  arm64_image: "registry.yichamao.com/rcoder:latest-arm64"

  # AMD64 架构专用镜像
  amd64_image: "registry.yichamao.com/rcoder:latest-amd64"

  # 默认回退镜像 (当无法检测架构或架构不匹配时使用)
  default_image: "registry.yichamao.com/rcoder:latest"

  # 默认网络模式
  network_mode: "bridge"

  # 默认工作目录
  work_dir: "/app"

  # 是否启用自动清理
  auto_cleanup: true

  # 容器存活时间（秒）
  container_ttl_seconds: 3600
