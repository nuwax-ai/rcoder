name: rcoder
services:
  rcoder:
    image: ${RCODER_IMAGE:-master-rcoder:latest}
    ports:
      - "${RCODER_PORT:-8087}:${RCODER_PORT:-8087}"
      - "8088:8088" # Pingora 反向代理端口（VNC 代理、健康检查等）
    environment:
      - TZ=Asia/Shanghai
      - RCODER_PORT=${RCODER_PORT:-8087}
      - RUST_LOG=debug # 设置调试日志级别
      # 🎯 关键：获取docker sock,用于检测宿主机路径
      - DOCKER_SOCKET_PATH=${DOCKER_SOCKET_PATH:-/var/run/docker.sock}
    volumes:
      # 挂载 Docker socket
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      # 🎯 挂载本地测试配置文件（使用与主容器相同的镜像）
      - ./config.yml:/app/config.yml
      # 挂载项目工作目录 - 这是关键的挂载！
      - ./project_workspace:/app/project_workspace
      # 挂载 computer 项目工作目录
      - ./computer-project-workspace:/app/computer-project-workspace
      # 挂载工作目录
      - ./logs/:/app/logs
      # 挂载启动脚本
      - ./start-rcoder.sh:/app/start-rcoder.sh
      # 专门用于npm,pnpm,bun,uvx 缓存使用的目录
      - ./computer-cache:/root/.cache
    command: ["/bin/bash", "/app/start-rcoder.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    networks:
      - local-agent-network

networks:
  local-agent-network:
    driver: bridge
