name: rcoder
services:

  rcoder:
    image: ${DOCKER_REGISTRY}/rcoder:${RCODER_VERSION}
    ports:
      - "${RCODER_PORT:-8086}:${RCODER_PORT:-8086}"
    environment:
      - TZ=Asia/Shanghai
      - RCODER_PORT=${RCODER_PORT:-8086}
      # 🎯 关键：获取docker sock,用于检测宿主机路径
      - DOCKER_SOCKET_PATH=${DOCKER_SOCKET_PATH:-/var/run/docker.sock}
    volumes:
      # 挂载 Docker socket
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      # 挂载工作目录
      - ./logs/:/app/logs
      # 挂载启动脚本
      - ./start-rcoder.sh:/app/start-rcoder.sh
    entrypoint: ["/bin/bash", "/app/start-rcoder.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${RCODER_PORT:-8086}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    networks:
      - agent-network


networks:
  agent-network:
    driver: bridge
    # 以下配置可能有助于解决 openEuler 上的网络问题  
    driver_opts:
      com.docker.network.bridge.name: agent-bridge
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      # 禁用IPv6
      com.docker.network.enable_ipv6: "false"