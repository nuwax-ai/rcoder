name: rcoder
services:

  rcoder:
    image: ${RCODER_IMAGE:-master-rcoder:latest}
    ports:
      - "${RCODER_PORT:-8087}:${RCODER_PORT:-8087}"
    environment:
      - TZ=Asia/Shanghai
      - RCODER_PORT=${RCODER_PORT:-8087}
      # 🎯 关键：获取docker sock,用于检测宿主机路径
      - DOCKER_SOCKET_PATH=${DOCKER_SOCKET_PATH:-/var/run/docker.sock}
    volumes:
      # 挂载 Docker socket
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      # 挂载项目工作目录 - 这是关键的挂载！
      - ./project_workspace:/app/project_workspace
      # 挂载工作目录
      - ./logs/:/app/logs
      # 挂载启动脚本
      - ./start-rcoder.sh:/app/start-rcoder.sh
      # 开发模式：挂载本地编译的 rcoder 可执行文件（仅在开发模式下生效）
      - ./rcoder:/app/rcoder:ro
    command: ["/bin/bash", "/app/start-rcoder.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    networks:
      - agent-network


networks:
  agent-network:
    driver: bridge
    # 以下配置可能有助于解决 openEuler 上的网络问题  
    driver_opts:
      com.docker.network.bridge.name: agent-bridge
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      # 禁用IPv6
      com.docker.network.enable_ipv6: "false"