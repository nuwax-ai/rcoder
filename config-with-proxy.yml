# RCoder 配置文件（包含代理设置）

# 默认使用的 AI 代理类型
default_agent: claude

# 项目工作目录
projects_dir: ./project_workspace

# 主服务端口
port: 3000

# 代理配置
proxy_config:
  # 代理服务监听端口
  listen_port: 8080

  # 默认后端端口（当 URL 中没有 port 参数时使用）
  default_backend_port: 3000

  # 后端服务主机地址
  backend_host: "127.0.0.1"

  # URL 中端口参数的名称
  port_param: "port"