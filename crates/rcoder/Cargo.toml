[package]
name = "rcoder"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[lib]
name = "rcoder"
path = "src/lib.rs"

[[example]]
name = "multimedia_chat_example"
path = "examples/multimedia_chat_example.rs"

[[example]]
name = "chat_with_data_source_example"
path = "examples/chat_with_data_source_example.rs"

[[example]]
name = "chat_with_strings_data_source_example"
path = "examples/chat_with_strings_data_source_example.rs"

[dependencies]
# Internal crates
shared_types = { path = "../shared_types" }
nuwax_parser = { path = "../nuwax_parser" }
acp-adapter = { path = "../acp_adapter" }
codex-acp-agent = { path = "../codex-acp-agent" }
codex-core = { git = "https://github.com/openai/codex" , branch = "main" }
claude-code-agent = { path = "../claude-code-agent" }


clap ={workspace = true}
# ACP Protocol
agent-client-protocol = { workspace = true }
async-trait = "0.1"
parking_lot = "0.12"
tempfile = { workspace = true }

# HTTP server
axum = { workspace = true, features = ["multipart"] }
tower = { workspace = true }
tower-http = { workspace = true, features = ["cors", "trace"] }
futures = { workspace = true }
tokio-stream = "0.1"

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_yaml = "0.9"

derive_builder= { workspace = true }

# Workspace dependencies
tokio = { workspace = true, features = ["full"] }
tokio-util = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["fmt", "env-filter", "json"] }
tracing-appender = "0.2"
uuid = { workspace = true, features = ["v4", "serde"] }
chrono = { workspace = true, features = ["serde"] }
dashmap = { workspace = true }
bytes = "1.0"
futures-util = { workspace = true }
piper = "0.2"
base64 = "0.21"
reqwest = { version = "0.11", features = ["json"] }

# OpenTelemetry
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true }
tracing-opentelemetry = { workspace = true }
axum-tracing-opentelemetry = { workspace = true }

# File system
tokio-fs = { workspace = true }
path-clean = { workspace = true }

# OpenAPI documentation
utoipa = { workspace = true }
utoipa-swagger-ui = { workspace = true }

ringbuf={workspace = true}