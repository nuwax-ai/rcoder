syntax = "proto3";
package agent;

// Agent 核心服务
service AgentService {
  // 聊天对话接口 (Unary)
  rpc Chat (ChatRequest) returns (ChatResponse);

  // 订阅会话进度流 (Server Streaming)
  // 替代原有的 /agent/progress/{session_id} SSE 接口
  rpc SubscribeProgress (ProgressRequest) returns (stream ProgressEvent);

  // 取消会话任务 (Unary)
  rpc CancelSession (CancelRequest) returns (CancelResponse);
  
  // 获取 Agent 状态 (Unary)
  rpc GetStatus (GetStatusRequest) returns (GetStatusResponse);
}

// === 消息定义 ===

message ChatRequest {
  string project_id = 1;
  string session_id = 2;
  string prompt = 3;
  // 模型配置等可选字段
  optional ModelProviderConfig model_config = 4;
  // 附件列表，作为JSON字符串传输，或者后续定义具体的Message
  repeated Attachment attachments = 5;
  // 请求ID
  optional string request_id = 6;
}

message ChatResponse {
  string request_id = 1;
  bool success = 2;
  // 错误信息等
  optional string error = 3;
}

message ProgressRequest {
  string session_id = 1;
}

message ProgressEvent {
  // 事件类型
  oneof event {
    string log = 1;      // 普通日志
    string thought = 2;  // 思考过程
    string chunk = 3;    // 内容片段
    bool done = 4;       // 完成信号
    string error = 5;    // 错误信息
  }
  // 保留原始 JSON 用于兼容过渡
  string json_payload = 10;
  // 时间戳 (使用 Unix timestamp)
  int64 timestamp = 11;
}

message CancelRequest {
  string session_id = 1;
  string reason = 2;
}

message CancelResponse {
  bool success = 1;
}

message GetStatusRequest {
  string project_id = 1;
}

message GetStatusResponse {
  string status = 1; // "idle", "busy", "error"
}

message ModelProviderConfig {
  string provider = 1;
  string model = 2;
  optional string api_key = 3;
  optional string api_base = 4;
}

// 附件定义
message Attachment {
    string name = 1;
    // 附件类型: text, image, file 等
    string kind = 2; 
    // 内容，对于文本直接是内容，对于图片可能是base64或者url
    string content = 3;
    // 来源: local, upload, paste 等
    string source = 4;
    // 语言 (仅文本)
    optional string language = 5;
}


